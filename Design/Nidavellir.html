<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nidavellir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="nidavellir-screens.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      -webkit-font-smoothing: antialiased;
    }

    /* ─ Scrollbar ─ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* ─ Animations ─ */
    @keyframes nidPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 5px currentColor; }
      50%       { opacity: 0.5; box-shadow: 0 0 2px currentColor; }
    }
    @keyframes nidBounce {
      0%, 80%, 100% { transform: translateY(0);   opacity: 0.4; }
      40%           { transform: translateY(-5px); opacity: 1;   }
    }
    @keyframes nidBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes nidFadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .nid-screen {
      animation: nidFadeSlide 0.18s ease-out;
    }

    /* ─ Nav hover ─ */
    .nid-nav-item:hover {
      background: #21262d !important;
      color: #e6edf3 !important;
    }

    /* ─ Inputs ─ */
    input, textarea, select { font-family: inherit; }
    button { font-family: inherit; }
    button:hover { filter: brightness(1.1); }
    button:disabled:hover { filter: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  const NAV_GROUPS = [
    {
      label: 'Interaction',
      items: [
        { id: 'chat', label: 'Chat',
          icon: <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0 1 13.25 12H9.06l-2.573 2.573A1.458 1.458 0 0 1 4 13.543V12H2.75A1.75 1.75 0 0 1 1 10.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h4.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg> },
      ],
    },
    {
      label: 'Work',
      items: [
        { id: 'plan', label: 'Plan',
          icon: <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 8.75 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg> },
        { id: 'schedule', label: 'Schedule',
          icon: <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.75 0a.75.75 0 0 1 .75.75V2h5V.75a.75.75 0 0 1 1.5 0V2h1.25c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0 1 13.25 16H2.75A1.75 1.75 0 0 1 1 14.25V3.75C1 2.784 1.784 2 2.75 2H4V.75A.75.75 0 0 1 4.75 0ZM2.5 7.5v6.75c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V7.5Zm10.75-4H2.75a.25.25 0 0 0-.25.25V6h11V3.75a.25.25 0 0 0-.25-.25Z"/></svg> },
        { id: 'agents', label: 'Agents',
          icon: <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 3.5a2 2 0 1 1 4 0 2 2 0 0 1-4 0ZM7.5 0a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7ZM3 8a2 2 0 0 0-2 2v1.25a.75.75 0 0 0 1.5 0V10c0-.276.224-.5.5-.5h8c.276 0 .5.224.5.5v1.25a.75.75 0 0 0 1.5 0V10a2 2 0 0 0-2-2H3Z"/></svg> },
      ],
    },
    {
      label: 'Resources',
      items: [
        { id: 'tasks', label: 'Tasks',
          icon: <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 1.75v11.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25H2.75a.25.25 0 0 0-.25.25ZM2.75 0h10.5c.966 0 1.75.784 1.75 1.75v11.5A1.75 1.75 0 0 1 13.25 15H2.75A1.75 1.75 0 0 1 1 13.25V1.75C1 .784 1.784 0 2.75 0ZM4.75 7.25a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5Zm0 3a.75.75 0 0 0 0 1.5h4a.75.75 0 0 0 0-1.5Zm0-6a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5Z"/></svg> },
        { id: 'skills', label: 'Skills',
          icon: <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm5.5-.5a.75.75 0 0 0 0 1.5h2.75V11a.75.75 0 0 0 1.5 0V8.25a.75.75 0 0 0-.75-.75Zm.25-3.75a.75.75 0 0 0 0 1.5h.008a.75.75 0 0 0 0-1.5Z"/></svg> },
      ],
    },
  ];

  const SCREEN_MAP = {
    chat:     window.NidChat,
    plan:     window.NidPlan,
    schedule: window.NidSchedule,
    agents:   window.NidAgents,
    tasks:    window.NidTasks,
    skills:   window.NidSkills,
    settings: window.NidSettings,
  };

  // Live agent pulse indicator for nav header
  function AgentPip() {
    const [on, setOn] = useState(true);
    React.useEffect(() => {
      const iv = setInterval(() => setOn(v => !v), 1800);
      return () => clearInterval(iv);
    }, []);
    return (
      <span title="2 agents active" style={{
        display: 'inline-flex', alignItems: 'center', gap: 4,
        fontSize: 10, color: '#3fb950',
        padding: '2px 6px', borderRadius: 10,
        border: '1px solid #3fb95044',
        background: '#3fb95016',
      }}>
        <span style={{
          width: 5, height: 5, borderRadius: '50%', background: '#3fb950',
          display: 'inline-block',
          boxShadow: on ? '0 0 6px #3fb950' : 'none',
          transition: 'box-shadow 0.8s ease',
        }} />
        2 active
      </span>
    );
  }

  function NavItem({ item, isActive, onClick }) {
    return (
      <div
        className="nid-nav-item"
        onClick={onClick}
        style={{
          display: 'flex', alignItems: 'center', gap: 9,
          padding: '8px 14px',
          fontSize: 13,
          cursor: 'pointer',
          color:      isActive ? '#3fb950' : '#8b949e',
          background: isActive ? '#21262d' : 'transparent',
          borderLeft: isActive ? '2px solid #3fb950' : '2px solid transparent',
          transition: 'all 0.15s',
          userSelect: 'none',
        }}
      >
        <span style={{ opacity: isActive ? 1 : 0.7, flexShrink: 0 }}>
          {item.icon}
        </span>
        {item.label}
      </div>
    );
  }

  function Nav({ active, onNavigate }) {
    return (
      <div style={{
        width: 200, flexShrink: 0,
        background: '#161b22',
        borderRight: '1px solid #30363d',
        display: 'flex', flexDirection: 'column',
      }}>
        {/* Logo */}
        <div style={{
          padding: '0 14px', height: 48, flexShrink: 0,
          borderBottom: '1px solid #30363d',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="#3fb950">
              <path d="M8 0L14.928 4v8L8 16 1.072 12V4z"/>
            </svg>
            <span style={{ fontSize: 12, fontWeight: 700, color: '#e6edf3',
              letterSpacing: '1.5px', textTransform: 'uppercase' }}>Nidavellir</span>
          </div>
          <AgentPip />
        </div>

        {/* Groups */}
        <div style={{ flex: 1, overflowY: 'auto', paddingTop: 8, paddingBottom: 8 }}>
          {NAV_GROUPS.map((group, gi) => (
            <div key={group.label} style={{ marginBottom: gi < NAV_GROUPS.length-1 ? 8 : 0 }}>
              <div style={{
                padding: '6px 14px 3px',
                fontSize: 10, fontWeight: 600, color: '#484f58',
                textTransform: 'uppercase', letterSpacing: '0.8px',
              }}>
                {group.label}
              </div>
              {group.items.map(item => (
                <NavItem
                  key={item.id}
                  item={item}
                  isActive={active === item.id}
                  onClick={() => onNavigate(item.id)}
                />
              ))}
            </div>
          ))}
        </div>

        {/* Settings */}
        <div style={{ borderTop: '1px solid #30363d', padding: '8px 0' }}>
          <NavItem
            item={{
              id: 'settings', label: 'Settings',
              icon: <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294.016.257.016.515 0 .772-.01.147.038.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.977 7.977 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.102-.302c-.067-.019-.177-.011-.3.071a5.909 5.909 0 0 1-.668.386c-.133.066-.194.158-.211.224l-.29 1.106c-.168.646-.715 1.196-1.458 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.064-1.289-.614-1.458-1.26l-.289-1.106c-.018-.066-.079-.158-.212-.224a5.738 5.738 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a8.012 8.012 0 0 1-.704-1.218c-.315-.675-.111-1.422.363-1.891l.815-.806c.05-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.038-.246-.088-.294l-.815-.806C.635 6.045.431 5.298.746 4.623a7.92 7.92 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.102.302c.067.019.177.011.3-.071.214-.143.437-.272.668-.386.133-.066.194-.158.211-.224l.29-1.106C6.717.645 7.264.095 8.007.031A8.18 8.18 0 0 1 8 0Zm-.5 5a3 3 0 1 0 1 0V5ZM6 8a2 2 0 1 1 4 0 2 2 0 0 1-4 0Z"/></svg>,
            }}
            isActive={active === 'settings'}
            onClick={() => onNavigate('settings')}
          />
        </div>
      </div>
    );
  }

  function App() {
    const [view, setView]           = useState('chat');
    const [spawnOpen, setSpawnOpen] = useState(false);

    React.useEffect(() => {
      const onSpawn = () => setSpawnOpen(true);
      const onNav   = (e) => setView(e.detail);
      window.addEventListener('nid:spawn',    onSpawn);
      window.addEventListener('nid:navigate', onNav);
      return () => {
        window.removeEventListener('nid:spawn',    onSpawn);
        window.removeEventListener('nid:navigate', onNav);
      };
    }, []);

    const Screen = SCREEN_MAP[view] || SCREEN_MAP.chat;

    return (
      <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
        <Nav active={view} onNavigate={setView} />
        <div key={view} className="nid-screen"
          style={{ flex: 1, display: 'flex', overflow: 'hidden', minWidth: 0 }}>
          <Screen />
        </div>
        {spawnOpen && <window.SpawnModal onClose={() => setSpawnOpen(false)} />}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
